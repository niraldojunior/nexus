<!-- @dsCard group="Components" viewport="700x460" name="Core — buttons, badges, status, KPIs" subtitle="Button · Badge · StatusPill · Input · Card · MetricCard" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-app); font-family: var(--font-ui); }
  .group { margin-bottom: 18px; }
  .lbl { font: var(--text-eyebrow); text-transform: uppercase; letter-spacing: .05em; color: var(--text-tertiary); margin-bottom: 9px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Badge, StatusPill, Input, Card, MetricCard } = window.VTalNexusDesignSystem_63587b;
    // lucide -> react helper using the stable data-attribute API
    const kebab = (s) => s.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
    const Ic = ({ name, size = 16 }) => {
      const ref = React.useRef(null);
      React.useEffect(() => {
        if (ref.current && window.lucide) {
          ref.current.innerHTML = `<i data-lucide="${kebab(name)}" style="width:${size}px;height:${size}px"></i>`;
          window.lucide.createIcons({ attrs: { width: size, height: size }, nameAttr: 'data-lucide', root: ref.current });
        }
      });
      return <span ref={ref} style={{ display: 'flex' }} />;
    };
    function Demo() {
      return (
        <div>
          <div className="group">
            <div className="lbl">Buttons</div>
            <div className="row">
              <Button variant="primary" iconLeft={<Ic name="Plus" />}>Novo elemento</Button>
              <Button variant="secondary">Filtrar</Button>
              <Button variant="ghost">Cancelar</Button>
              <Button variant="dark" iconLeft={<Ic name="Download" />}>Exportar</Button>
              <Button variant="danger">Remover</Button>
              <Button variant="primary" disabled>Desabilitado</Button>
            </div>
          </div>
          <div className="group">
            <div className="lbl">Badges &amp; Status</div>
            <div className="row">
              <Badge tone="brand">TM Forum</Badge>
              <Badge tone="ink">API-first</Badge>
              <Badge tone="neutral">Geonet</Badge>
              <StatusPill status="online" pulse />
              <StatusPill status="parcial" />
              <StatusPill status="inviavel" />
              <StatusPill status="planejado" />
            </div>
          </div>
          <div className="group">
            <div className="lbl">Input</div>
            <div className="row" style={{ maxWidth: 360 }}>
              <Input label="Endereço de viabilidade" iconLeft={<Ic name="Search" />} placeholder="Rua, número, CEP…" />
            </div>
          </div>
          <div className="group">
            <div className="lbl">Metric cards</div>
            <div className="grid3">
              <MetricCard label="Homes Passed" value="1.28M" delta="2.4%" icon={<Ic name="Network" />} />
              <MetricCard label="OLTs ativas" value="412" delta="1.1%" icon={<Ic name="Server" />} />
              <MetricCard label="Taxa de viabilidade" value="98.4" unit="%" accent icon={<Ic name="Zap" />} />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
