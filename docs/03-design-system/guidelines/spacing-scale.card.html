<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale — 4px base" subtitle="0·4·8·12·16·24·32·48·64. Card padding lives on 12–24." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); font-family: var(--font-ui); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { text-align: center; }
  .bar { background: var(--vt-yellow); border-radius: 4px; width: 100%; }
  .box { display:flex; align-items:flex-end; justify-content:center; height: 70px; }
  .v { font: var(--text-label); color: var(--text-primary); margin-top: 8px; }
  .t { font: var(--text-eyebrow); font-family: var(--font-mono); color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item" style="width:34px"><div class="box"><div class="bar" style="height:4px"></div></div><div class="v">4</div><div class="t">space-1</div></div>
    <div class="item" style="width:40px"><div class="box"><div class="bar" style="height:8px"></div></div><div class="v">8</div><div class="t">space-2</div></div>
    <div class="item" style="width:44px"><div class="box"><div class="bar" style="height:12px"></div></div><div class="v">12</div><div class="t">space-3</div></div>
    <div class="item" style="width:48px"><div class="box"><div class="bar" style="height:16px"></div></div><div class="v">16</div><div class="t">space-4</div></div>
    <div class="item" style="width:54px"><div class="box"><div class="bar" style="height:24px"></div></div><div class="v">24</div><div class="t">space-5</div></div>
    <div class="item" style="width:60px"><div class="box"><div class="bar" style="height:32px"></div></div><div class="v">32</div><div class="t">space-6</div></div>
    <div class="item" style="width:70px"><div class="box"><div class="bar" style="height:48px"></div></div><div class="v">48</div><div class="t">space-7</div></div>
    <div class="item" style="width:80px"><div class="box"><div class="bar" style="height:64px"></div></div><div class="v">64</div><div class="t">space-8</div></div>
  </div>
</body>
</html>
