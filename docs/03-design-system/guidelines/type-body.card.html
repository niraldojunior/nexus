<!-- @dsCard group="Type" viewport="700x200" name="Body & UI — Inter" subtitle="Inter across the product. Regular for prose, semibold for labels." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--surface-card); font-family: var(--font-ui); }
  .line { display: flex; justify-content: space-between; align-items: baseline; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .tag { font: var(--text-eyebrow); font-family: var(--font-mono); color: var(--text-tertiary); }
  .lead { font-size: var(--fs-body-lg); font-weight: var(--fw-regular); color: var(--text-secondary); }
  .body { font-size: var(--fs-body); color: var(--text-primary); }
  .label { font: var(--text-label); color: var(--text-primary); }
  .eyebrow { font: var(--text-eyebrow); text-transform: uppercase; letter-spacing: var(--tracking-wide); color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="line"><span class="lead">Rede neutra, escala nacional.</span><span class="tag">1rem / 400</span></div>
  <div class="line"><span class="body">CTO-4821 · Rua das Palmeiras, 320 — 12 portas livres</span><span class="tag">0.9rem / 400</span></div>
  <div class="line"><span class="label">Status do elemento</span><span class="tag">0.8rem / 600</span></div>
  <div class="line" style="border:0"><span class="eyebrow">Última sincronização</span><span class="tag">0.7rem / 700</span></div>
</body>
</html>
