<!-- @dsCard group="Type" viewport="700x180" name="Display — Montserrat" subtitle="Extrabold, tight tracking. KPIs, page titles, section headers." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--surface-card); font-family: var(--font-display); }
  .display { font: var(--text-display); letter-spacing: var(--tracking-tight); color: var(--text-primary); }
  .h1 { font: var(--text-h1); letter-spacing: var(--tracking-tight); color: var(--text-primary); margin-top: 4px; }
  .h2 { font: var(--text-h2); letter-spacing: var(--tracking-tight); color: var(--text-secondary); margin-top: 4px; }
  .tag { font: var(--text-eyebrow); font-family: var(--font-mono); color: var(--text-tertiary); float: right; }
</style>
</head>
<body>
  <div class="display"><span class="tag">2.4rem / 800</span>1.284.920</div>
  <div class="h1"><span class="tag">1.8rem / 800</span>Inventário de Redes</div>
  <div class="h2"><span class="tag">1.4rem / 800</span>Viabilidade &amp; Topologia</div>
</body>
</html>
