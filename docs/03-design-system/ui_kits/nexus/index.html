<!-- @startingPoint section="V.tal Nexus" subtitle="Network inventory app — full interactive shell" viewport="1440x900" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V.tal Nexus — Inventário de Redes</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; margin: 0; }
  #app { height: 100vh; }
</style>
</head>
<body>
  <div id="app"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="./data.js"></script>
  <script type="text/babel" src="./shared.jsx"></script>
  <script type="text/babel" src="./Shell.jsx"></script>
  <script type="text/babel" src="./Login.jsx"></script>
  <script type="text/babel" src="./Dashboard.jsx"></script>
  <script type="text/babel" src="./Inventory.jsx"></script>
  <script type="text/babel" src="./Geo.jsx"></script>
  <script type="text/babel" src="./Viability.jsx"></script>
  <script type="text/babel" src="./Topology.jsx"></script>
  <script type="text/babel">
    const { Button, Input } = window.VTalNexusDesignSystem_63587b;

    const TITLES = {
      dashboard: { t: 'Visão Geral', s: 'Inventário de Redes · São Paulo, Rio de Janeiro +3' },
      inventory: { t: 'Inventário', s: 'Recursos físicos, lógicos e catálogo' },
      geo: { t: 'Geo', s: 'Geographic Site, Address & Location · TMF673/674/675' },
      viability: { t: 'Viabilidade', s: 'Motor fuzzy de viabilidade por endereço' },
      topology: { t: 'Topologia', s: 'Caminho óptico fim a fim · CTO-4821' },
    };

    function App() {
      const [authed, setAuthed] = React.useState(false);
      const [screen, setScreen] = React.useState('dashboard');

      if (!authed) return <Login onLogin={() => { setAuthed(true); setScreen('dashboard'); }} />;

      const meta = TITLES[screen] || { t: 'V.tal Nexus', s: '' };
      const right = (
        <>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '0 14px', height: 38, background: 'var(--surface-inset)', borderRadius: 'var(--radius-full)', minWidth: 240 }}>
            <Icon name="search" size={15} color="var(--text-tertiary)" />
            <span style={{ fontSize: 13, color: 'var(--text-tertiary)' }}>Buscar elemento, site, endereço…</span>
          </div>
          <button style={{ position: 'relative', width: 38, height: 38, borderRadius: 'var(--radius-full)', border: '1px solid var(--border)', background: 'var(--surface-card)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
            <Icon name="bell" size={17} color="var(--text-secondary)" />
            <span style={{ position: 'absolute', top: 8, right: 9, width: 7, height: 7, borderRadius: '50%', background: 'var(--status-red)', border: '1.5px solid var(--surface-card)' }} />
          </button>
        </>
      );

      let body;
      if (screen === 'dashboard') body = <Dashboard onNavigate={setScreen} />;
      else if (screen === 'inventory') body = <Inventory onNavigate={setScreen} />;
      else if (screen === 'geo') body = <Geo />;
      else if (screen === 'viability') body = <Viability />;
      else if (screen === 'topology') body = <Topology />;
      else body = <Placeholder name={meta.t} />;

      return (
        <Shell active={screen} onNavigate={setScreen} onLogout={() => setAuthed(false)} title={meta.t} subtitle={meta.s} headerRight={right}>
          {body}
        </Shell>
      );
    }

    function Placeholder({ name }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12, height: 360, color: 'var(--text-tertiary)' }}>
          <Icon name="hammer" size={32} />
          <div style={{ fontSize: 15, fontWeight: 600 }}>{name}</div>
          <div style={{ fontSize: 13 }}>Módulo em construção neste UI kit.</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
