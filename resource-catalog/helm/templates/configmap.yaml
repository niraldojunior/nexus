{{- range $key, $cm := (.Values.configMaps | default dict) }}
{{- if and $cm $cm.name $cm.data }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $cm.name | quote }}
  labels:
    {{- include "app.labels" $ | nindent 4 }}
data:
  {{- range $k, $v := $cm.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
{{- end }}
