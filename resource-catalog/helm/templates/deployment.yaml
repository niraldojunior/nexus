apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
    app: {{ include "app.label" . | quote }}
  annotations:
    backstage.io/kubernetes-id: {{ include "app.backstageKubernetesId" . }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
      app: {{ include "app.label" . | quote }}
  template:
    metadata:
      labels:
        {{- include "app.labels" . | nindent 8 }}
        app: {{ include "app.label" . | quote }}
      annotations:
        backstage.io/kubernetes-id: {{ include "app.backstageKubernetesId" . }}
    spec:
      {{- $serviceAccount := .Values.serviceAccount | default dict }}
      serviceAccountName: {{ include "app.serviceAccountName" . }}
      automountServiceAccountToken: {{ $serviceAccount.automountServiceAccountToken | default false }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- else if ((.Values.registrySecret | default dict).create | default false) }}
      imagePullSecrets:
        - name: {{ include "app.registrySecretName" . }}
      {{- end }}
      containers:
        - name: {{ include "app.label" . }}
          image: {{ required "image.ref é obrigatório (ex.: registry/repo/app@sha256:...)" .Values.image.ref | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort | default 8080 }}
              protocol: TCP
          {{- with .Values.probes }}
          {{- with .startup }}
          {{- if (.enabled | default false) }}
          startupProbe:
{{ omit . "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with .liveness }}
          {{- if (.enabled | default false) }}
          livenessProbe:
{{ omit . "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with .readiness }}
          {{- if (.enabled | default false) }}
          readinessProbe:
{{ omit . "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- $envFrom := list }}
          {{- range (.Values.envFrom | default list) }}
          {{- if and .secretRef .secretRef.name (ne (toString .secretRef.name) "") }}
          {{- $envFrom = append $envFrom . }}
          {{- else if and .configMapRef .configMapRef.name (ne (toString .configMapRef.name) "") }}
          {{- $envFrom = append $envFrom . }}
          {{- end }}
          {{- end }}
          {{- if gt (len $envFrom) 0 }}
          envFrom:
{{ toYaml $envFrom | nindent 12 }}
          {{- end }}
          {{- $envList := list }}
          {{- if kindIs "map" (.Values.env | default dict) }}
          {{- range $k, $v := (.Values.env | default dict) }}
          {{- $envList = append $envList (dict "name" $k "value" (toString $v)) }}
          {{- end }}
          {{- else if kindIs "slice" (.Values.env | default list) }}
          {{- range (.Values.env | default list) }}
          {{- $envList = append $envList . }}
          {{- end }}
          {{- end }}
          {{- range (.Values.extraEnv | default list) }}
          {{- $envList = append $envList . }}
          {{- end }}
          {{- if gt (len $envList) 0 }}
          env:
{{ toYaml $envList | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}
